<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Stella Daily</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Palcoscenico 16:9 -->
<main id="stage" aria-label="Scena del giorno">
  <img id="scene" alt="" draggable="false">
  <div id="object-layers"></div>

  <!-- Vignetta di dialogo: box PNG per personaggio + testo scorrevole sopra -->
  <div id="dialogue" class="hidden">
    <img id="speak-box" alt="" draggable="false">
    <p id="dialogue-text"></p>
  </div>

  <!-- Riquadro "fine discorso": compare quando Stella ha finito di parlare -->
  <img id="speech-end" class="hidden" alt="" draggable="false">

  <!-- Illustrazione oggetto: si sovrappone alla scena, si chiude cliccando ovunque -->
  <img id="illustration" class="hidden" alt="" draggable="false">

  <!-- Logo: full-frame, allineato al palco 16:9, visibile su ogni giornata -->
  <img id="logo" src="assets/logo.png" alt="Stella Daily" draggable="false">

  <!-- Elementi legacy nascosti (il box PNG contiene già icona e nome) -->
  <img id="face-img" class="hidden" alt="">
  <span id="speaker-name" class="hidden"></span>

  <!-- Frecce di navigazione fra le giornate -->
  <button id="nav-prev" class="nav-arrow hidden" aria-label="Giornata precedente">&#10094;</button>
  <button id="nav-next" class="nav-arrow hidden" aria-label="Giornata successiva">&#10095;</button>

  <!-- Pulsante archivio -->
  <button id="archive-btn" title="Giorni passati">&#10032;</button>

  <!-- Pulsante audio -->
  <button id="audio-btn" class="hidden" title="Musica on/off">&#9835;</button>
</main>

<!-- Musica della giornata -->
<audio id="bgm" loop preload="auto"></audio>

<!-- Overlay contenuto oggetto -->
<div id="overlay" class="hidden" role="dialog" aria-modal="true">
  <div id="overlay-panel">
    <button id="overlay-close" aria-label="Chiudi">&times;</button>
    <div id="overlay-content"></div>
  </div>
</div>

<!-- Overlay archivio -->
<div id="archive" class="hidden" role="dialog" aria-modal="true">
  <div id="archive-panel">
    <button id="archive-close" aria-label="Chiudi">&times;</button>
    <h2>I giorni passati</h2>
    <ul id="archive-list"></ul>
  </div>
</div>

<!-- Prompt rotazione su mobile verticale -->
<div id="rotate-prompt">
  <div class="rotate-star">&#10022;</div>
  <p>Ruota il telefono!</p>
</div>

<!-- Messaggio se non c'è nessun giorno -->
<div id="empty-state" class="hidden">
  <p>Oggi non c'&egrave; nessuno in casa&hellip; torna presto!</p>
</div>

<script src="main.js"></script>
</body>
</html>
